<nav class="navbar">
  <div class="navbar-container">
    <span class="logo" (click)="irAInicio()">
      <svg xmlns="http://www.w3.org/2000/svg" class="logo-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M13 5v6h6" />
      </svg>
      Microempresarios
    </span>

    <ul class="nav-links" *ngIf="!estaLogueado">
      <li (click)="irAInicio()"><i class="fas fa-home"></i> Inicio</li>
      <li (click)="irARegistro()"><i class="fas fa-user-plus"></i> Registrar</li>
      <li (click)="irALogin()"><i class="fas fa-sign-in-alt"></i> Login</li>
    </ul>

    <div class="navbar-actions" *ngIf="estaLogueado">
      
      <div class="nav-cart-container" *ngIf="isClient">
        <button class="btn-nav-cart" (click)="irCarrito()">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-label">Carrito</span>
          <span class="cart-badge" *ngIf="(carritoService.carrito$ | async) as carrito">
            {{ carrito.productos.length }}
          </span>
        </button>
      </div>

      <div class="user-menu-wrapper">
        <div class="user-menu" (click)="toggleDropdown()" tabindex="0" (blur)="cerrarDropdown()">
          <span class="welcome-text">
            <svg class="user-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A9 9 0 1117.804 5.12M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            {{ nombreUsuario }}
          </span>
          <svg class="dropdown-icon" [class.rotate]="dropdownVisible" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>

        <ul class="dropdown-menu" [class.show]="dropdownVisible">
          <li (click)="irAPerfil()">Perfil</li>
          <li (click)="irAProductos()">Productos</li>
          <li (click)="logout()" class="logout-item">Cerrar sesión</li>
        </ul>
      </div>

    </div>
  </div>
</nav>
