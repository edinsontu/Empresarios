<div class="chat-bot">
  <div class="chat-toggle" (click)="toggleChat()">
    💬
  </div>

  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">Asistente Virtual</div>
    <div class="chat-body">
      <div *ngFor="let msg of messages" [ngClass]="{'bot': msg.from === 'bot', 'user': msg.from === 'user'}">
        {{ msg.text }}
      </div>
    </div>
    <div class="chat-options" *ngIf="questions[step] && messages[messages.length - 1].from === 'bot'">
      <button *ngFor="let opt of questions[step].options" (click)="selectOption(opt)">
        {{ opt }}
      </button>
    </div>
  </div>
</div>
