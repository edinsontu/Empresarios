<!-- Font Awesome para iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-user-shield"></i>
      </div>
      <h2>Iniciar Sesión</h2>
      <p>Bienvenido de nuevo</p>
    </div>

    <!-- Mensaje de error -->
    <div *ngIf="errorMessage" class="error-message">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" novalidate>
      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Correo electrónico</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" required email #emailInput="ngModel"
          [class.invalid]="emailInput.invalid && (emailInput.touched || loginForm.submitted)" placeholder="tu@email.com" />
        <div *ngIf="emailInput.invalid && (emailInput.touched || loginForm.submitted)" class="field-error">
          <i class="fas fa-info-circle"></i>
          <span *ngIf="emailInput.errors?.['required']">El correo es obligatorio</span>
          <span *ngIf="emailInput.errors?.['email']">Formato de correo inválido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" required minlength="6"
          #passwordInput="ngModel" placeholder="••••••"
          [class.invalid]="passwordInput.invalid && (passwordInput.touched || loginForm.submitted)" />
        <div *ngIf="passwordInput.invalid && (passwordInput.touched || loginForm.submitted)" class="field-error">
          <i class="fas fa-info-circle"></i>
          <span *ngIf="passwordInput.errors?.['required']">La contraseña es obligatoria</span>
          <span *ngIf="passwordInput.errors?.['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" />
          <span class="checkmark"></span> Recordarme
        </label>
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="auth-button" [disabled]="loginForm.invalid">
        Ingresar <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a (click)="irARegistro()">Regístrate aquí</a></p>
      <div class="social-login">
        <p>O ingresa con</p>
        <div class="social-icons">
          <a href="#" class="google"><i class="fab fa-google"></i></a>
          <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="#" class="twitter"><i class="fab fa-twitter"></i></a>
        </div>
      </div>
    </div>
  </div>
</div>
